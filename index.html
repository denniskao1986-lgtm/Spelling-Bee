<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FET Spelling Bee App</title>
    <style>
        :root {
            --primary-yellow: #FFD93D;
            --sky-blue: #6EB3F7;
            --accent-orange: #FF923E;
            --correct-green: #6BCB77;
            --wrong-red: #FF6B6B;
            --vowel-red: #E63946;
            --consonant-blue: #1D3557;
            --bg-color: #F0F9FF;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Header & Controls */
        .header {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        h1 {
            text-align: center;
            color: var(--sky-blue);
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            text-shadow: 1px 1px 0px #fff;
        }

        .control-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        select {
            flex: 1;
            padding: 8px;
            border-radius: 10px;
            border: 2px solid var(--sky-blue);
            font-size: 1rem;
            outline: none;
        }

        /* Tabs */
        .tab-container {
            display: flex;
            width: 100%;
            max-width: 600px;
            gap: 5px;
            margin-bottom: 15px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: #ddd;
            border-radius: 15px 15px 0 0;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab.active {
            background: var(--primary-yellow);
            color: #444;
            transform: translateY(-5px);
        }

        /* Main Card */
        .card {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        /* Mode A: Review Styles */
        .word-display { font-size: 3.5rem; font-weight: bold; margin-bottom: 10px; letter-spacing: 2px; }
        .vowel { color: var(--vowel-red); }
        .consonant { color: var(--consonant-blue); }
        .syllables { color: #888; font-size: 1.2rem; margin-bottom: 15px; }
        .info-box { font-size: 1.2rem; margin: 10px 0; padding: 10px; border-radius: 10px; background: #f9f9f9; }
        .hidden { display: none !important; }

        /* Mode B: Puzzle Styles */
        .puzzle-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .letter-btn {
            width: 50px; height: 50px; font-size: 1.5rem; font-weight: bold;
            background: var(--sky-blue); color: white; border: none; border-radius: 10px;
            cursor: pointer; box-shadow: 0 4px 0 #4a8dc9;
        }
        .letter-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #4a8dc9; }
        .answer-preview { font-size: 2.5rem; border-bottom: 4px dashed var(--sky-blue); min-width: 200px; height: 50px; margin-bottom: 20px; }

        /* Mode C: Dictation */
        .dictation-input {
            width: 80%; font-size: 2rem; padding: 10px; text-align: center;
            border: 3px solid var(--sky-blue); border-radius: 15px; outline: none;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px; border: none; border-radius: 50px; cursor: pointer;
            font-weight: bold; font-size: 1rem; transition: 0.2s;
        }
        .btn-speak { background: var(--primary-yellow); font-size: 1.5rem; margin: 10px; }
        .btn-toggle { background: #eee; margin: 5px; }
        .btn-reset { background: var(--accent-orange); color: white; margin-top: 20px; }
        .btn-clear { background: #bbb; color: white; margin-top: 10px; }

        /* Footer Nav */
        .footer-nav {
            width: 100%; max-width: 600px; display: flex; justify-content: space-between; margin-top: 20px;
        }
        .nav-btn {
            width: 48%; padding: 15px; border-radius: 15px; border: none;
            background: var(--sky-blue); color: white; font-size: 1.2rem; cursor: pointer;
        }
        .nav-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Popups */
        .overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7);
            display:none; justify-content:center; align-items:center; z-index:100;
        }
        .popup {
            background: white; padding: 40px; border-radius: 30px; text-align: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .popup h2 { font-size: 2.5rem; color: var(--correct-green); margin: 0; }

        @media (max-width: 480px) {
            .word-display { font-size: 2.2rem; }
            .letter-btn { width: 40px; height: 40px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🐝 FET Spelling Bee</h1>
        <div class="control-row">
            <select id="weekSelect" onchange="changeWeek()">
                <!-- Weeks populated by JS -->
            </select>
            <select id="voiceSelect">
                <!-- Voices populated by JS -->
            </select>
        </div>
    </div>

    <div class="tab-container">
        <div class="tab active" onclick="switchMode('Review')">Review</div>
        <div class="tab" onclick="switchMode('Puzzle')">Puzzle</div>
        <div class="tab" onclick="switchMode('Dictation')">Dictation</div>
    </div>

    <div class="card">
        <!-- Loading State -->
        <div id="loadingState" style="text-align: center; padding: 40px;">
            <h2 style="color: var(--sky-blue);">⏳ 正在載入單字資料...</h2>
            <p style="color: #666;">（每次載入，都會同步您最新的 Google Sheet 資料）</p>
        </div>

        <!-- Mode A: Review -->
        <div id="modeReview" class="hidden">
            <div class="syllables" id="reviewSyllables"></div>
            <div class="word-display" id="reviewWord"></div>
            <button class="btn btn-speak" onclick="speakCurrentWord()">🔊</button>
            <div id="posBox" class="info-box"></div>
            <div id="chineseBox" class="info-box"></div>
            <div>
                <button class="btn btn-toggle" onclick="toggleVisibility('posBox')">Hide/Show POS</button>
                <button class="btn btn-toggle" onclick="toggleVisibility('chineseBox')">Hide/Show Chinese</button>
            </div>
        </div>

        <!-- Mode B: Puzzle -->
        <div id="modePuzzle" class="hidden">
            <div class="answer-preview" id="puzzlePreview"></div>
            <div class="puzzle-area" id="puzzleBoard"></div>
            <button class="btn btn-reset" onclick="initPuzzle()">↺ 重置積木 (Reset)</button>
        </div>

        <!-- Mode C: Dictation -->
        <div id="modeDictation" class="hidden">
            <button class="btn btn-speak" style="font-size: 3rem;" onclick="speakCurrentWord()">🔊</button>
            <p>Listen and Type:</p>
            <input type="text" id="dictInput" class="dictation-input" autocomplete="off" oninput="checkDictation()">
            <br>
            <button class="btn btn-clear" onclick="clearDictation()">↺ 清除輸入 (Clear)</button>
        </div>
    </div>

    <div class="footer-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevWord()" disabled>上一個 (Prev)</button>
        <button class="nav-btn" id="nextBtn" onclick="nextWord()" disabled>下一個 (Next)</button>
    </div>

    <div class="overlay" id="overlay">
        <div class="popup">
            <h2 id="encourageText">Excellent!</h2>
        </div>
    </div>

    <script>
        // --- Data Structure ---
        const TSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTlA-Qu3A4mASY9AnZS-XwNY9SApQ8ot2jZKRr4phGfeq-ngxueCEkRrsHSgYdzBp9hNlX09CYzbqDz/pub?output=tsv";
        let wordData = [];

        // --- State Variables ---
        let currentMode = 'Review';
        let currentWeekWords = [];
        let currentIndex = 0;
        let puzzleInput = "";
        let synth = window.speechSynthesis;
        let voices = [];

        // --- Init ---
        window.onload = async () => {
            try {
                await fetchTSVData();
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('modeReview').classList.remove('hidden');
                
                populateWeeks();
                loadVoices();
                changeWeek();
                
                // 開放按鈕
                document.getElementById('prevBtn').disabled = false;
                document.getElementById('nextBtn').disabled = false;

                if (speechSynthesis.onvoiceschanged !== undefined) {
                    speechSynthesis.onvoiceschanged = loadVoices;
                }
            } catch (error) {
                console.error("載入資料失敗:", error);
                document.querySelector('.card').innerHTML = 
                    `<h2 style="color:var(--wrong-red); margin-bottom: 20px;">資料載入失敗 ❌</h2>
                     <p style="font-size:1.1rem; padding: 0 10px;">請確認您的 Google Sheet 已開放為「發布到網路」並且輸出格式為「TSV」。</p>
                     <p style="color:#666; font-size:0.9rem;">(錯誤訊息：${error.message})</p>`;
            }
        };

        async function fetchTSVData() {
            // 加入時間戳記避免快取，確保能及時反映 Google Sheet 的修改
            const response = await fetch(TSV_URL + "&t=" + new Date().getTime());
            if (!response.ok) throw new Error("HTTP 狀態碼 " + response.status);
            const text = await response.text();
            
            // 解析 TSV
            const lines = text.trim().split('\n');
            wordData = [];
            
            // i=1 是為了跳過表頭 (Header 列)
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const cols = line.split('\t');
                if (cols.length >= 5) {
                    wordData.push({
                        wk: parseInt(cols[0], 10),
                        w: cols[1].trim(),
                        s: cols[2].trim(),
                        p: cols[3].trim(),
                        c: cols[4].trim()
                    });
                }
            }
            
            if (wordData.length === 0) {
                throw new Error("試算表中沒有找到有效資料。");
            }
        }

        function populateWeeks() {
            const select = document.getElementById('weekSelect');
            select.innerHTML = ''; 
            const weeks = [...new Set(wordData.map(w => w.wk))].sort((a,b)=>a-b);
            weeks.forEach(wk => {
                let opt = document.createElement('option');
                opt.value = wk;
                opt.textContent = `Week ${wk}`;
                select.appendChild(opt);
            });
        }

        function loadVoices() {
            voices = synth.getVoices();
            const voiceSelect = document.getElementById('voiceSelect');
            voiceSelect.innerHTML = '';
            
            let bestVoiceIndex = -1;
            let fallbackVoiceIndex = -1;

            voices.forEach((voice, i) => {
                if (voice.lang.includes('en')) {
                    let opt = document.createElement('option');
                    opt.value = i;
                    opt.textContent = `${voice.name} (${voice.lang})`;
                    
                    if (voice.name.includes('Microsoft Ava Multilingual Online')) {
                        bestVoiceIndex = i;
                    } else if (fallbackVoiceIndex === -1 && (voice.name.includes('Google US English') || voice.name.includes('Samantha') || voice.name.includes('Microsoft Zira'))) {
                        fallbackVoiceIndex = i;
                    }
                    voiceSelect.appendChild(opt);
                }
            });

            // 設定預設語音：Ava 優先，其他優質語音次之
            const selectedIndex = bestVoiceIndex !== -1 ? bestVoiceIndex : fallbackVoiceIndex;
            if (selectedIndex !== -1) {
                Array.from(voiceSelect.options).forEach(opt => {
                    if (parseInt(opt.value) === selectedIndex) {
                        opt.selected = true;
                    }
                });
            } else if (voiceSelect.options.length > 0) {
                voiceSelect.options[0].selected = true;
            }
        }

        // --- Navigation ---
        function changeWeek() {
            let selectVal = document.getElementById('weekSelect').value;
            if(!selectVal && wordData.length > 0) {
                selectVal = wordData[0].wk;
            }
            const wk = parseInt(selectVal);
            currentWeekWords = wordData.filter(w => w.wk === wk);
            
            if(currentWeekWords.length === 0) return;
            
            currentIndex = 0;
            updateDisplay();
        }

        function nextWord() {
            if (currentIndex < currentWeekWords.length - 1) {
                currentIndex++;
                updateDisplay();
            } else {
                showFinish();
            }
        }

        function prevWord() {
            if (currentIndex > 0) {
                currentIndex--;
                updateDisplay();
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // hide all normal modes
            document.getElementById('modeReview').classList.add('hidden');
            document.getElementById('modePuzzle').classList.add('hidden');
            document.getElementById('modeDictation').classList.add('hidden');
            
            document.getElementById(`mode${mode}`).classList.remove('hidden');
            updateDisplay();
        }

        // --- Core Logic ---
        function updateDisplay() {
            const wordObj = currentWeekWords[currentIndex];
            if(!wordObj) return;
            
            document.getElementById('prevBtn').disabled = (currentIndex === 0);
            document.getElementById('nextBtn').disabled = false;
            
            if (currentMode === 'Review') {
                renderReview(wordObj);
            } else if (currentMode === 'Puzzle') {
                initPuzzle();
            } else if (currentMode === 'Dictation') {
                clearDictation();
            }
            speakCurrentWord();
        }

        // Mode A Logic
        function renderReview(obj) {
            const wordHtml = obj.w.split('').map(char => {
                if (/[aeiouAEIOU]/.test(char)) return `<span class="vowel">${char}</span>`;
                return `<span class="consonant">${char}</span>`;
            }).join('');
            
            document.getElementById('reviewWord').innerHTML = wordHtml;
            document.getElementById('reviewSyllables').textContent = `(${obj.s})`;
            document.getElementById('posBox').textContent = obj.p;
            document.getElementById('chineseBox').textContent = obj.c;
        }

        function toggleVisibility(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        // Mode B Logic
        function initPuzzle() {
            const word = currentWeekWords[currentIndex].w;
            puzzleInput = "";
            document.getElementById('puzzlePreview').textContent = "";
            const board = document.getElementById('puzzleBoard');
            board.innerHTML = "";
            
            // Shuffle letters
            let letters = word.split('').sort(() => Math.random() - 0.5);
            letters.forEach((l, idx) => {
                let btn = document.createElement('button');
                btn.className = 'letter-btn';
                btn.textContent = l;
                btn.onclick = () => {
                    puzzleInput += l;
                    document.getElementById('puzzlePreview').textContent = puzzleInput;
                    btn.style.visibility = "hidden";
                    checkPuzzle();
                };
                board.appendChild(btn);
            });
        }

        function checkPuzzle() {
            const target = currentWeekWords[currentIndex].w;
            if (puzzleInput === target) {
                handleSuccess();
            } else if (puzzleInput.length >= target.length) {
                // Wrong answer
                setTimeout(() => {
                    alert("Oops! Try again.");
                    initPuzzle();
                }, 300);
            }
        }

        // Mode C Logic
        function clearDictation() {
            const input = document.getElementById('dictInput');
            input.value = "";
            input.focus();
        }

        function checkDictation() {
            const val = document.getElementById('dictInput').value;
            if(!currentWeekWords[currentIndex]) return;
            const target = currentWeekWords[currentIndex].w;
            if (val.toLowerCase() === target.toLowerCase()) {
                handleSuccess();
            }
        }

        // Success Feedback
        function handleSuccess() {
            playDing();
            speakCurrentWord();
            showEncouragement();
            
            setTimeout(() => {
                hideOverlay();
                nextWord();
            }, 1500);
        }

        function showEncouragement() {
            const words = ["Excellent!", "Wonderful!", "Fantastic!", "Terrific!", "Superb!", "Fabulous!"];
            document.getElementById('encourageText').textContent = words[Math.floor(Math.random() * words.length)];
            document.getElementById('overlay').style.display = 'flex';
        }

        function showFinish() {
            document.getElementById('encourageText').textContent = "🎉 本週完成！Well Done!";
            document.getElementById('overlay').style.display = 'flex';
            setTimeout(hideOverlay, 3000);
        }

        function hideOverlay() {
            document.getElementById('overlay').style.display = 'none';
        }

        // --- Audio & TTS ---
        function speakCurrentWord() {
            if(!currentWeekWords[currentIndex]) return;
            const word = currentWeekWords[currentIndex].w;
            const utter = new SpeechSynthesisUtterance(word);
            const selectedVoiceIndex = document.getElementById('voiceSelect').value;
            if (voices[selectedVoiceIndex]) {
                utter.voice = voices[selectedVoiceIndex];
            }
            utter.rate = 0.8;
            synth.speak(utter);
        }

        function playDing() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); // A5

            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
        }
    </script>
</body>
</html>
